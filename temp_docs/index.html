<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scanova Pages</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef6ff, #ffffff);
      color: #141a29;
    }

    main {
      width: min(700px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 50px);
      margin: 0 0 12px;
    }

    p {
      color: #667287;
      line-height: 1.65;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    a {
      display: block;
      padding: 20px 22px;
      border-radius: 22px;
      text-decoration: none;
      color: #141a29;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(15, 24, 45, 0.08);
      box-shadow: 0 18px 40px rgba(15, 24, 45, 0.08);
    }

    strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Scanova</h1>
    <p>Public support and privacy pages for App Store Connect.</p>

    <div class="links">
      <a href="./support.html">
        <strong>Support</strong>
        Help, contact, and subscription support information.
      </a>
      <a href="./privacy.html">
        <strong>Privacy Policy</strong>
        Privacy and permissions information for Scanova.
      </a>
    </div>
  </main>
</body>
</html>
